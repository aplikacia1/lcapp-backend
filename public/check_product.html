<!DOCTYPE html>
<html lang="sk">

<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Overenie produktu</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
}

body{
  min-height:100vh;
  background:#071226;
  color:white;
  padding:14px;
}

.app{
  max-width:760px;
  margin:0 auto;
}

.topbar{
  position:relative;
  background:#0d1d3a;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  text-align:center;
}

.back-btn{
  position:absolute;
  left:12px;
  top:12px;
  width:44px;
  height:44px;
  border:0;
  border-radius:12px;
  background:#13284d;
  color:white;
  font-size:24px;
  font-weight:700;
  cursor:pointer;
}

.title{
  font-size:24px;
  font-weight:800;
}

.user{
  margin-top:6px;
  opacity:.7;
  font-size:13px;
}

.warehouse-switch{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.warehouse-btn{
  flex:1;
  border:0;
  border-radius:14px;
  height:52px;
  background:#13284d;
  color:white;
  font-size:18px;
  font-weight:700;
}

.scanner{
  background:#0d1d3a;
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
}

.scanner-title{
  font-size:22px;
  font-weight:800;
  margin-bottom:10px;
}

.camera-box{
  height:180px;
  border:2px dashed rgba(255,255,255,.25);
  border-radius:16px;
  overflow:hidden;
  margin-bottom:14px;
}

.manual-label{
  font-size:14px;
  opacity:.7;
  margin-bottom:8px;
}

.scan-input{
  width:100%;
  height:58px;
  border:0;
  border-radius:14px;
  background:#13284d;
  color:white;
  padding:0 16px;
  font-size:24px;
}

.product-card{
  background:#0d1d3a;
  border-radius:18px;
  padding:18px;
}

.product-name{
  font-size:28px;
  font-weight:800;
  margin-bottom:10px;
}

.product-code{
  opacity:.8;
  margin-bottom:12px;
}

.stock-line{
  font-size:22px;
  margin-bottom:10px;
}

.price-line{
  font-size:26px;
  font-weight:800;
  color:#35d07f;
  margin-bottom:14px;
}

.desc-line{
  line-height:1.5;
  opacity:.92;
  margin-bottom:16px;
}

.info-note{
  font-size:12px;
  opacity:.6;
  margin-bottom:18px;
}

.reset-btn{
  width:100%;
  height:62px;
  border:0;
  border-radius:14px;
  background:#18a558;
  color:white;
  font-size:20px;
  font-weight:800;
}

@media(max-width:520px){

  .title{
    font-size:21px;
  }

  .product-name{
    font-size:23px;
  }

  .stock-line{
    font-size:19px;
  }

  .price-line{
    font-size:22px;
  }

}

</style>

</head>

<body>

<main class="app">

  <header class="topbar">

    <button
  id="backBtn"
  class="back-btn">

  ←

</button>

    <div class="title">
      💰 Overenie produktu
    </div>

    <div class="user">
      Interný nástroj
    </div>

  </header>

  <div class="warehouse-switch">

    <button
      id="warehouseBA"
      class="warehouse-btn">

      🏢 BA

    </button>

    <button
      id="warehouseZA"
      class="warehouse-btn">

      🏢 ZA

    </button>

  </div>

  <section class="scanner">

    <div class="scanner-title">
      Načítaj produkt
    </div>

    <div class="camera-box">

      <video
        id="camera"
        autoplay
        playsinline
        muted
      ></video>

    </div>

    <div class="manual-label">
      Alebo napíš kód produktu
    </div>

    <input
      id="scanInput"
      class="scan-input"
      placeholder="napr. F110TSI"
      autofocus
    />

  </section>

  <section class="product-card">

    <div id="productName" class="product-name">
      Čakám na produkt…
    </div>

    <div id="productCode" class="product-code">
      Kód: —
    </div>

    <div id="stockBA" class="stock-line">
      BA sklad: —
    </div>

    <div id="stockZA" class="stock-line">
      ZA sklad: —
    </div>

    <div id="productPrice" class="price-line">
      Cena: —
    </div>

    <div id="productDescription" class="desc-line">
      —
    </div>

    <div class="info-note">

      Údaje sú orientačné.
      Niektoré položky už mohli byť počas dňa predané
      alebo naskladnené.

    </div>

    <button
      id="resetBtn"
      class="reset-btn">

      🔄 Nové vyhľadávanie

    </button>

  </section>

</main>

<script src="https://unpkg.com/@zxing/browser@latest"></script>
<script src="check_product.js"></script>

</body>
</html>
