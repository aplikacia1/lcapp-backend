<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Hra – Lištobook</title>
<link rel="stylesheet" href="style.css"/>

<style>
:root{
  --hdr-h: 72px;
  --desk-footer-h: 36px;
}

body{
  background:#061c47;
  color:#fff;
  margin:0;
  font-family:Arial, sans-serif;
}

/* ===== HEADER (nový jednoduchý) ===== */
.app-header{
  position:fixed;
  inset:0 0 auto 0;
  z-index:1000;
  background:#0c1f4b;
  border-bottom:1px solid rgba(255,255,255,.12);
}

.app-header-inner{
  max-width:1120px;
  margin:0 auto;
  padding:8px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
}

.icon-btn{
  position:absolute;
  top:10px;
  left:12px;
  width:44px;
  height:44px;
  display:grid;
  place-content:center;
  border:1px solid #ffffff33;
  border-radius:10px;
  color:#e7eefc;
  stroke:#ffffff;
  background:transparent;
  cursor:pointer;
}

.icon-btn svg{
  stroke:#ffffff;
  stroke-width:2.5;
}

.icon-btn svg path{
  stroke:#ffffff;
}

.logo-small{
  height:48px;
  margin:2px auto 6px;
  display:block;
}

.user-chip{
  color:#cfe2ff;
  font-size:.95rem;
  margin-bottom:8px;
  text-align:center;
}
/* ===== BANNER SLOT ===== */
#bannerSlot{ margin-top:var(--hdr-h); }

/* ===== WRAP ===== */
.wrap{
  max-width:820px;
  margin:16px auto;
  padding:0 16px;
}

@media (min-width: 992px){
  .wrap{ padding-bottom: calc(var(--desk-footer-h) + 16px); }
}

/* ===== BOARD ===== */
.board{
  width:360px;
  max-width:92vw;
  aspect-ratio:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin:0 auto 16px;
}

.tile{
  background:#eef4fb;
  color:#0c1f4b;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
  box-shadow:0 6px 14px rgba(0,0,0,.25);
}

.tile--empty{
  background:transparent;
  box-shadow:none;
  border:2px dashed rgba(255,255,255,.25);
}

/* ===== PANEL ===== */
.panel{
  max-width:420px;
  margin:0 auto;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.15);
  border-radius:14px;
  padding:14px;
  backdrop-filter:blur(4px);
}

.panel-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.badge{
  background:#eef4fb;
  color:#0c1f4b;
  padding:6px 12px;
  border-radius:10px;
  font-weight:600;
}

.btn{
  width:100%;
  height:42px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.25);
  background:#ffffff;
  color:#0c1f4b;
  font-weight:600;
}

/* ===== MODAL (nový štýl) ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.modal-card{
  width:100%;
  max-width:380px;
  margin:0 16px;
  background:
    radial-gradient(circle at 0 0,#1d4ed8 0,rgba(15,23,42,0.96) 52%,#020617 100%);
  border-radius:18px;
  padding:20px;
  border:1px solid rgba(129,140,248,.9);
  text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,.9);
}

.modal-card h2{ margin:0 0 8px; }
.modal-card p{ opacity:.9; }

.modal-card .btn{
  margin-top:10px;
}

/* ===== FOOTER PC ===== */
#desktopFooter{ display:none; }

@media (min-width: 992px){
  #desktopFooter{
    display:block;
    position:fixed;
    left:0; right:0; bottom:0;
    height:var(--desk-footer-h);
    background:rgba(7,18,44,.92);
    border-top:1px solid rgba(255,255,255,.12);
    font-size:12px;
    line-height:var(--desk-footer-h);
    text-align:center;
  }
}
</style>
</head>

<body>

<header class="app-header" role="banner">
  <div class="app-header-inner">
    <button class="icon-btn" id="backBtn" aria-label="Späť">
      <svg viewBox="0 0 24 24" width="26" height="26">
        <path d="M15 18l-6-6 6-6"
              stroke="#ffffff"
              stroke-width="3.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"/>
      </svg>
    </button>

    <img src="logo_lc.jpg" alt="Lištové centrum" class="logo-small">

    <div class="user-chip" id="userChip"></div>
  </div>
</header>

<div id="bannerSlot"></div>

<main class="wrap">
  <div id="board" class="board"></div>

  <section class="panel">
    <div class="panel-row">
      <strong>Hra 8-puzzle</strong>
      <div>
        <span class="badge">Ťahy: <span id="moves">0</span></span>
        <span class="badge">Čas: <span id="time">00:00</span></span>
      </div>
    </div>
    <button id="shuffleBtn" class="btn">Zamiešať</button>
  </section>
</main>

<div id="winModal" class="modal">
  <div class="modal-card">
    <h2>Super práca 👷</h2>
    <p>Hotovo. Oddýchol si si — teraz späť hodnotiť produkty 🙂</p>
    <button id="playAgainBtn" class="btn">Hrať znova</button>
    <button id="goRateBtn" class="btn">Ísť hodnotiť</button>
  </div>
</div>

<div id="desktopFooter">
Lištobook © Lištové centrum EU
</div>

<script src="banners.js"></script>
<script>
document.addEventListener('DOMContentLoaded', ()=>{
  mountBanner?.('bannerSlot',{
    fixed:false,
    height:140,
    heightMobile:110,
    interval:5000
  });
});

(function(){
  const header = document.querySelector('.app-header');
  function setHdrH(){
    if(header){
      document.documentElement.style.setProperty(
        '--hdr-h',
        header.getBoundingClientRect().height + 'px'
      );
    }
  }
  setHdrH();
  window.addEventListener('resize', setHdrH);
})();

</script>

<script src="game.js"></script>

</body>
</html>
