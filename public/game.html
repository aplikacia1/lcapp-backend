<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Hra – Lištobook</title>
<link rel="stylesheet" href="style.css"/>

<style>
:root{
  --hdr-h: 72px;
}

body{
  background:#061c47;
  color:#fff;
  margin:0;
  font-family:Arial, sans-serif;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* HEADER */
.app-header{
  position:fixed;
  inset:0 0 auto 0;
  z-index:1000;
  background:#0c1f4b;
  border-bottom:1px solid rgba(255,255,255,.12);
}

.app-header-inner{
  max-width:1120px;
  margin:0 auto;
  padding:8px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
}

.icon-btn{
  position:absolute;
  top:10px;
  left:12px;
  width:44px;
  height:44px;
  display:grid;
  place-content:center;
  border:1px solid #ffffff33;
  border-radius:10px;
  color:#e7eefc;
  background:transparent;
  cursor:pointer;
}

.logo-small{
  height:48px;
  margin:2px auto 6px;
}

.user-chip{
  color:#cfe2ff;
  font-size:.95rem;
  margin-bottom:8px;
}

/* CENTER GAME */
.wrap{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding-top:var(--hdr-h);
}

/* BOARD */
.board{
  width:360px;
  max-width:92vw;
  aspect-ratio:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-bottom:20px;
}

.tile{
  background:#eef4fb;
  color:#0c1f4b;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
  box-shadow:0 6px 14px rgba(0,0,0,.25);
}

.tile--empty{
  background:transparent;
  box-shadow:none;
  border:2px dashed rgba(255,255,255,.25);
}

/* PANEL */
.panel{
  max-width:420px;
  margin:0 auto;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.15);
  border-radius:14px;
  padding:14px;
  backdrop-filter:blur(4px);
}

.panel-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.badge{
  background:#eef4fb;
  color:#0c1f4b;
  padding:6px 12px;
  border-radius:10px;
  font-weight:600;
}

.btn{
  width:100%;
  height:42px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.25);
  background:#ffffff;
  color:#0c1f4b;
  font-weight:600;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.modal-card{
  width:100%;
  max-width:380px;
  margin:0 16px;
  background:
    radial-gradient(circle at 0 0,#1d4ed8 0,rgba(15,23,42,0.96) 52%,#020617 100%);
  border-radius:18px;
  padding:20px;
  border:1px solid rgba(129,140,248,.9);
  text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,.9);
}

</style>
</head>

<body>

<header class="app-header">
  <div class="app-header-inner">
    <button class="icon-btn" id="backBtn">←</button>
    <img src="logo_lc.jpg" class="logo-small">
    <div class="user-chip" id="userChip"></div>
  </div>
</header>

<main class="wrap">
  <div>
    <div id="board" class="board"></div>

    <section class="panel">
      <div class="panel-row">
        <strong>Hra 8-puzzle</strong>
        <div>
          <span class="badge">Ťahy: <span id="moves">0</span></span>
          <span class="badge">Čas: <span id="time">00:00</span></span>
        </div>
      </div>
      <button id="shuffleBtn" class="btn">Zamiešať</button>
    </section>
  </div>
</main>

<div id="winModal" class="modal">
  <div class="modal-card">
    <h2>Super práca 👷</h2>
    <p>Hotovo. Oddýchol si si — teraz späť hodnotiť produkty 🙂</p>
    <button id="playAgainBtn" class="btn">Hrať znova</button>
    <button id="goRateBtn" class="btn">Ísť hodnotiť</button>
  </div>
</div>

<script>
(function(){
  const header = document.querySelector('.app-header');
  function setHdrH(){
    if(header){
      document.documentElement.style.setProperty(
        '--hdr-h',
        header.getBoundingClientRect().height + 'px'
      );
    }
  }
  setHdrH();
  window.addEventListener('resize', setHdrH);
})();
</script>

<script src="game.js"></script>

</body>
</html>
