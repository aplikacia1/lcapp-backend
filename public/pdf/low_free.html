<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
font-family:Arial, sans-serif;
padding:40px;
color:#333;
}

h1{
font-size:22px;
margin-bottom:30px;
}

table{
border-collapse:collapse;
width:100%;
font-size:14px;
}

td{
border:1px solid #ccc;
padding:10px;
}

td:first-child{
background:#f5f5f5;
width:40%;
}

</style>

</head>

<body>

<h1>Balkón – nízka konštrukčná výška / voľný okraj</h1>

<table>

<tr>
<td>Plocha balkóna</td>
<td>{{area}} m²</td>
</tr>

<tr>
<td>Obvod voľných hrán</td>
<td>{{perimeter}} m</td>
</tr>

<tr>
<td>Hrúbka dlažby</td>
<td>{{tile}} mm</td>
</tr>

<tr>
<td>Formát dlažby</td>
<td>{{tiles}} cm</td>
</tr>

</table>

</body>
</html>
