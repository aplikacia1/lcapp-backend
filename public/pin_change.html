<!DOCTYPE html>
<html lang="sk">
<head>
<meta name="theme-color" content="#0c1f4b">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zmena PIN</title>

<style>
body{
  background:#0c1f4b;
  font-family:system-ui,sans-serif;
}

.auth-wrap{
  max-width:420px;
  margin:40px auto;
  padding:16px;
  text-align:center;
}

.logo{
  height:120px;
  margin:24px auto 8px;
  display:block;
}

h1{
  color:white;
  margin-bottom:20px;
}

.pin-dots{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:30px;
}

.dot{
  width:14px;
  height:14px;
  border-radius:50%;
  background:#cfe2ff40;
}

.dot.active{
  background:white;
}

.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.key{
  height:72px;
  font-size:26px;
  font-weight:600;
  border-radius:14px;
  border:1px solid #bcd6ff;
  background:white;
  color:#0c1f4b;
  cursor:pointer;
}

.key:active{
  transform:scale(.96);
  box-shadow:0 0 10px #bcd6ff;
}

.msg{
  margin-top:16px;
  color:#ffaaaa;
}

.lb-back{
  position:absolute;
  top:20px;
  left:20px;
  width:46px;
  height:46px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.lb-back svg{
  width:18px;
  height:18px;
  fill:white;
}
</style>
</head>

<body>

<div class="lb-back" onclick="goBack()">
<svg viewBox="0 0 24 24">
<path d="M15 18l-6-6 6-6"/>
</svg>
</div>

<div class="auth-wrap">
  <img src="logo_lc.jpg" class="logo">
  <h1>Zmena PIN</h1>

  <div class="pin-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="keypad">
    <button class="key" onclick="press(1)">1</button>
    <button class="key" onclick="press(2)">2</button>
    <button class="key" onclick="press(3)">3</button>

    <button class="key" onclick="press(4)">4</button>
    <button class="key" onclick="press(5)">5</button>
    <button class="key" onclick="press(6)">6</button>

    <button class="key" onclick="press(7)">7</button>
    <button class="key" onclick="press(8)">8</button>
    <button class="key" onclick="press(9)">9</button>

    <button class="key" onclick="back()">←</button>
    <button class="key" onclick="press(0)">0</button>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
let step = 1;
let pin = "";
let oldPin = "";
let newPin = "";

const dots = document.querySelectorAll(".dot");
const msg = document.getElementById("msg");

const params = new URLSearchParams(window.location.search);
let email = params.get("email") || localStorage.getItem("lb_user_email");

function goBack(){
  window.location.href = "pin_manage.html?email=" + encodeURIComponent(email);
}

function updateDots(){
  dots.forEach(d => d.classList.remove("active"));
  for(let i=0;i<pin.length;i++){
    dots[i].classList.add("active");
  }
}

function press(n){
  if(pin.length >= 4) return;

  pin += n;
  updateDots();

  if(pin.length === 4){
    process();
  }
}

function back(){
  pin = pin.slice(0,-1);
  updateDots();
}

function process(){

  if(step === 1){
    oldPin = pin;
    pin = "";
    step = 2;
    updateDots();
    msg.textContent = "Zadajte nový PIN";
    return;
  }

  if(step === 2){
    newPin = pin;
    pin = "";
    step = 3;
    updateDots();
    msg.textContent = "Zopakujte nový PIN";
    return;
  }

  if(step === 3){

    if(pin !== newPin){
      msg.textContent = "PINy sa nezhodujú";
      pin = "";
      newPin = "";
      step = 2;
      updateDots();
      return;
    }

    changePin();
  }
}

function changePin(){

  fetch("/api/pin/verify-pin",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email, pin: oldPin })
  })
  .then(r => {

    if(!r.ok){
      msg.textContent = "Starý PIN je nesprávny";
      step = 1;
      pin = "";
      updateDots();
      return;
    }

    fetch("/api/pin/set-pin",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email, pin: newPin })
    })
    .then(()=>{

      msg.style.color = "#8fff9f";
      msg.textContent = "PIN bol zmenený";

      setTimeout(()=>{
        window.location.href = "pin_manage.html?email=" + encodeURIComponent(email);
      },1200);

    });

  });
}
</script>

</body>
</html>
