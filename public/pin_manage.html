<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Správa PIN</title>

<style>
body{
  background:#0c1f4b;
  font-family:system-ui;
  margin:0;
}

.wrap{
  max-width:420px;
  margin:40px auto;
  padding:16px;
  text-align:center;
}

.logo{
  height:110px;
  margin:20px auto;
}

h1{
  color:white;
  margin-bottom:25px;
}

.btn{
  display:block;
  width:100%;
  padding:16px;
  margin-top:12px;
  border-radius:14px;
  border:none;
  font-size:16px;
  cursor:pointer;
}

.enable{
  background:white;
  color:#0c1f4b;
}

.change{
  background:white;
  color:#0c1f4b;
}

.remove{
  background:#ff4b4b;
  color:white;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="wrap">

<img src="logo_lc.jpg" class="logo">

<h1>Správa PIN</h1>

<div id="enableBox" class="hidden">
  <button class="btn enable" onclick="enablePin()">Zapnúť PIN</button>
</div>

<div id="manageBox" class="hidden">
  <button class="btn change" onclick="changePin()">Zmeniť PIN</button>
  <button class="btn remove" onclick="removePin()">Vypnúť PIN</button>
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
let email = params.get("email") || localStorage.getItem("lb_user_email");

if(!email){
  alert("Relácia vypršala");
  window.location.href = "login.html";
}

// ✅ správny endpoint
fetch("/api/pin/has-pin?email=" + encodeURIComponent(email))
.then(r => r.json())
.then(data => {

  if(data.hasPin){
    document.getElementById("manageBox").classList.remove("hidden");
  } else {
    document.getElementById("enableBox").classList.remove("hidden");
  }

});

function enablePin(){
  window.location.href = "pin_setup.html?email=" + encodeURIComponent(email);
}

function changePin(){
  window.location.href = "pin_change.html?email=" + encodeURIComponent(email);
}

function removePin(){

  if(!confirm("Naozaj chcete vypnúť PIN?")) return;

  // ✅ správny endpoint
  fetch("/api/pin/disable-pin",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ email })
  })
  .then(r => r.json())
  .then(() => {

    localStorage.removeItem("lb_has_pin");

    alert("PIN bol vypnutý");
    location.reload();

  });
}

</script>

</body>
</html>
